    <!-- Sets data-theme before CSS loads to prevent a flash of wrong theme -->
    <script>
      (function () {
        try {
          var s = localStorage.getItem('theme')
          document.documentElement.setAttribute(
            'data-theme',
            s === 'dark' || s === 'light'
              ? s
              : window.matchMedia('(prefers-color-scheme: dark)').matches
              ? 'dark'
              : 'light',
          )
        } catch (_) {}
      })()
    </script>
